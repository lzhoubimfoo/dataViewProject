      .small{font:700 18px "Microsoft YaHei",Arial,sans-serif;fill:#0a2b67}
      .orbit{fill:none;stroke:#77aef1;stroke-width:1.2;opacity:.42}
      .dash{fill:none;stroke:#64a7f7;stroke-width:1.4;stroke-dasharray:5 8;opacity:.48}
      .flow{fill:none;stroke-linecap:round;filter:url(#glow)}
      .platform{fill:#f7fbff;stroke:#7ab8ff;stroke-width:2;filter:url(#softShadow)}
      .ring{fill:none;stroke-width:12;stroke-linecap:round;filter:url(#glow)}
      .city{fill:none;stroke:#91bdf0;stroke-width:1.4;opacity:.22}
    </style>
  </defs>

