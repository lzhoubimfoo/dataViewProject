<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="46%" stop-color="#eaf4ff"/>
      <stop offset="100%" stop-color="#b9d7fb"/>
    </radialGradient>
    <linearGradient id="blue" x1="0" x2="1">
      <stop offset="0" stop-color="#55b8ff"/>
      <stop offset="1" stop-color="#075ee8"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" x2="1">
      <stop offset="0" stop-color="#2df5dd"/>
      <stop offset="1" stop-color="#0b94ff"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0" stop-color="#ffe86d"/>
      <stop offset="1" stop-color="#f5a600"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#2b79d4" flood-opacity=".22"/>
